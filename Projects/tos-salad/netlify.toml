[build]
  # Build command to run (installs dependencies and builds frontend)
  command = "npm run build"

  # Directory to publish (Next.js build output relative to repo root)
  publish = "frontend/.next"

[build.environment]
  # Node.js version (required for Next.js 15.5.3)
  NODE_VERSION = "18"

  # Next.js specific environment variables
  NEXT_TELEMETRY_DISABLED = "1"

  # Build optimization
  NPM_FLAGS = "--legacy-peer-deps"

# Next.js Runtime Plugin for Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Function settings for API routes
[functions]
  node_bundler = "esbuild"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Static file caching
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API route configuration
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

# Development settings
[dev]
  command = "npm run dev"
  port = 3000
  publish = "frontend/.next"
  autoLaunch = false

# =====================================
# ENVIRONMENT VARIABLES CONFIGURATION
# =====================================
# Add these in Netlify Dashboard > Site Settings > Environment Variables:
#
# Required for Database:
# DATABASE_URL = "postgresql://username:password@host/database?sslmode=require"
#
# Required for AI Analysis:
# GOOGLE_GEMINI_API_KEY = "your_google_gemini_api_key"
#
# Optional Performance Settings:
# CACHE_TTL_SECONDS = "60"
# NODE_ENV = "production"